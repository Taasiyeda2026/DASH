<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />

<title>מערכת שיבוצים חכמה</title>

<style>
  *{box-sizing:border-box}
  body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:24px 16px;
    color:#0f172a;
  }
  .page-shell{
    width:100%;
    max-width:1120px;
    margin:0 auto;
    padding:0 10px 20px;
  }
  h1{margin:0 0 14px 0;font-size:22px}
  .scheduling-page .grid{
    display:grid;
    grid-template-columns:1fr;
    gap:20px;
  }
  .col{
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  .suggestion-wrapper{ display:block; }
  .suggestion-wrapper .card{ max-width:none; width:100%; }
  .courses-wrapper{
    display:flex;
    justify-content:center;
  }
  .courses-wrapper .card{
    max-width:260px;
    width:100%;
  }
  .card{
    background:#fff;
    padding:18px;
    border-radius:14px;
    box-shadow:0 6px 22px rgba(0,0,0,.08);
  }
  .row{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:12px;
  }
  label{
    display:block;font-size:13px;font-weight:800;
    color:#2563eb;margin:8px 0 6px
  }
  select,input,button{
    width:100%;
    padding:10px 12px;
    border-radius:10px;
    border:1px solid #cbd5e1;
    font-size:14px;
    background:#fff;
  }
  button{
    margin-top:12px;
    background:#2563eb;
    color:#fff;
    border:none;
    font-weight:900;
    cursor:pointer;
  }
  button:hover{background:#1e40af}
  .note{
    margin-top:10px;
    font-size:12px;
    color:#64748b;
    line-height:1.6;
  }
  .status{
    display:none;
    margin-top:10px;
    padding:10px 12px;
    border-radius:12px;
    font-size:13px;
    line-height:1.6;
  }
  .status.error{background:#fef2f2;border:1px solid #fecaca;color:#991b1b}
  .status.ok{background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8}

  /* tables */
  .table-wrap{overflow:auto;border:1px solid #e2e8f0;border-radius:12px}
  table{width:100%;border-collapse:collapse}
  th,td{
    padding:10px 12px;
    border-bottom:1px solid #eef2f7;
    text-align:right;
    font-size:13px;
    white-space:nowrap;
  }
  th{background:#f1f5f9;font-weight:900}
  tr:hover td{background:#fafcff}
  .small{font-size:12px;color:#64748b;font-weight:700}
  /* suggestions list */
  .list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:10px}
  .item{
    border:1px solid #e2e8f0;
    border-radius:12px;
    padding:12px;
    background:#fff;
  }
  .item-header{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
    margin-bottom:8px;
  }
  .card-title{
    font-size:18px;
    font-weight:700;
    margin-bottom:12px;
    border-bottom:1px solid #e5e7eb;
    padding-bottom:8px;
  }
  .result-date{
    font-weight:700;
    margin-bottom:6px;
  }
  .item-sub{font-size:12px;color:#64748b;font-weight:700}
  .options{
    display:block;
  }
  .opt{
    display:block;
    padding:6px 0;
    font-size:13px;
    font-weight:700;
  }
  .muted{color:#94a3b8;font-weight:700}
  .topbar{
    display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;
  }
  .search{
    width:280px;
    max-width:100%;
  }
  .back-dashboard-btn{
    background:#475569;
    color:#fff;
    border:none;
    width:auto;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    padding:4px 10px;
    height:30px;
    border-radius:6px;
    font-size:13px;
    font-weight:400;

  }

  @media (min-width:1000px){
    .scheduling-page .grid{
      grid-template-columns:1fr 1fr;
    }
  }

  @media (max-width: 640px){
    body{padding:14px 10px;}
    .page-shell{padding:0 4px 14px;}
    .card{padding:14px;}
  }

  /* Scheduling table - compact mode */
  .scheduling-page .table-wrap{
    max-width: 100%;
    overflow: auto;
  }

  /* הכי חשוב: קומפקטיות */

    width: auto;
    border-collapse: collapse;
    table-layout: auto;
    font-size: 12px;
    line-height: 1.2;
    white-space: nowrap;
  }

  /* כותרות ותאים */
  .scheduling-page th,
  .scheduling-page td{
    padding: 4px 6px;
    border: 1px solid #e2e8f0;

  /* כותרת קומפקטית */

    font-weight: 800;

    background: #fff;
    z-index: 2;

  /* שורות נמוכות יותר */

  /* עמודות מספרים (ID וכו') */

  .scheduling-page th.num{

    width: 1%;
  }

  /* עמודות טקסט קצר */
  .scheduling-page td.short,
  .scheduling-page th.short{
    width: 1%;
  }

  /* עמודות ארוכות – לקצץ עם ... */
  .scheduling-page td.ellipsis{
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
</style>

<body>
  <div class="page-shell scheduling-page">
  <h1>📌 מערכת שיבוצים </h1>
  <div style="margin-bottom:14px;">
    <button class="back-dashboard-btn" onclick="goBackToDashboard()">
      ⬅ חזרה
    </button>
  </div>

  <div class="grid">

    <div class="col">
      <div class="suggestion-wrapper">
        <div class="card">
          <div class="card-title">הצעת שיבוצים</div>

          <div class="row">
            <div>
              <label>רשות יעד</label>
              <select id="authoritySelect"></select>
            </div>
            <div>
              <label>כמות ימים להציג</label>
              <select id="daysLimit">
                <option value="10">10</option>
                <option value="20" selected>20</option>
                <option value="30">30</option>
                <option value="50">50</option>
              </select>
            </div>
          </div>

          <div class="row">
            <div>
              <label>אפשרויות לכל תאריך</label>
              <select id="topN">
                <option value="3" selected>Top 3</option>
                <option value="5">Top 5</option>
              </select>
            </div>
            <div>
              <label>משך קורס (דקות)</label>
              <input id="durationMin" type="number" value="120" min="30" step="5"/>
            </div>
          </div>

          <button onclick="runSuggestions()">מצא שיבוץ </button>

          <div class="status" id="statusBox2"></div>
        </div>
      </div>

      <div class="card">
        <div class="topbar">
          <div style="font-weight:900;">תוצאות שיבוץ</div>
          <div class="small" id="metaInfo"></div>
        </div>

        <ul class="list" id="resultsList">
          <li class="muted">לחץ “מצא שיבוץ” כדי להציג תוצאות.</li>
        </ul>
      </div>
    </div>

    <div class="col">
      <div class="courses-wrapper">
        <div class="card">
        <div class="topbar">
          <div>
            <div style="font-weight:900;">מדריכים — כמות קורסים</div>
            <div class="small">רשימת מדריכים + מספר קורסים </div>
          </div>
          <input class="search" id="coursesSearch" placeholder="חיפוש מדריך..." oninput="renderCoursesTableFromLast()"/>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th class="ellipsis">מדריך</th>
                <th class="num short">כמות קורסים</th>
              </tr>
            </thead>
            <tbody id="coursesBody">
              <tr><td colspan="2" class="muted">טוען…</td></tr>
            </tbody>
          </table>
        </div>

        <div class="status" id="statusBoxCourses"></div>
        </div>
      </div>
    </div>

  </div>
  </div>

<script>
function showStatus(id, msg, type){
  const box = document.getElementById(id);
  box.textContent = msg;
  box.className = `status ${type}`;
  box.style.display = 'block';
}
function clearStatus(id){
  const box = document.getElementById(id);
  box.style.display = 'none';
  box.textContent = '';
}

function pad2(n){ return String(n).padStart(2,'0'); }
function toISODateLocal(d){
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
}
function addDays(d, days){
  const x = new Date(d.getTime());
  x.setDate(x.getDate() + days);
  return x;
}
function parseISODate(iso){
  const m = iso.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(!m) return null;
  return new Date(Number(m[1]), Number(m[2])-1, Number(m[3]));
}

function timeToMin(t){
  if(typeof t !== 'string') return null;
  const m = t.trim().match(/^(\d{1,2}):(\d{2})$/);
  if(!m) return null;
  const hh = Number(m[1]), mm = Number(m[2]);
  if(Number.isNaN(hh) || Number.isNaN(mm)) return null;
  return hh*60 + mm;
}
function minToTime(m){
  const hh = Math.floor(m/60);
  const mm = m % 60;
  return `${pad2(hh)}:${pad2(mm)}`;
}

function isWorkdaySunThu(dateObj){
  // JS: 0=Sun .. 6=Sat
  const d = dateObj.getDay();
  return d >= 0 && d <= 4; // Sun-Thu
}

function getNextWeekDatesISO(){
  const today = new Date();
  const dow = today.getDay(); // 0=Sun
  let daysUntilNextSunday = (7 - dow) % 7;
  if(daysUntilNextSunday === 0) daysUntilNextSunday = 7; // if today is Sunday -> next Sunday
  const nextSunday = addDays(new Date(today.getFullYear(), today.getMonth(), today.getDate()), daysUntilNextSunday);

  const dates = [];
  for(let i=0;i<5;i++){ // Sun..Thu
    dates.push(toISODateLocal(addDays(nextSunday, i)));
  }
  return dates;
}

function getSuggestionDatesISO(){
  const today = new Date();
  const base = new Date(today.getFullYear(), today.getMonth(), today.getDate());

  const start = addDays(base, 7);
  const end   = addDays(base, 30);

  const dates = [];
  let cur = start;
  while(cur <= end){
    if(isWorkdaySunThu(cur)){
      dates.push(toISODateLocal(cur));
    }
    cur = addDays(cur, 1);
  }
  return dates;
}

async function loadSchedulingDataFresh(){
  const res = await fetch('data/Scheduling/scheduling.json', { cache:'no-store' });
  if(!res.ok) throw new Error('לא ניתן לטעון data/Scheduling/scheduling.json');
  return await res.json();
}

function haversine(lat1, lon1, lat2, lon2){
  const R = 6371;
  const toRad = x => x * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}
function getDistanceKm(data, fromAuthority, toAuthority){
  const fromLoc = data.authorityLocations?.[fromAuthority];
  const toLoc   = data.authorityLocations?.[toAuthority];
  if(!fromLoc || !toLoc) return null;
  return haversine(fromLoc.lat, fromLoc.lng, toLoc.lat, toLoc.lng);
}

function courseOccursOnDate(course, dateISO){
  const dates = course.Dates || [];
  return dates.includes(dateISO);
}

function getInstructorEventsOnDate(data, employeeID, dateISO){
  const evs = [];
  for(const c of (data.courses || [])){
    if(String(c.EmployeeID) !== String(employeeID)) continue;
    if(!courseOccursOnDate(c, dateISO)) continue;
    const s = timeToMin(c.StartTime);
    const e = timeToMin(c.EndTime);
    if(s === null || e === null) continue;
    evs.push({ startMin:s, endMin:e, authority: String(c.Authority || '').trim() });
  }
  evs.sort((a,b)=>a.startMin-b.startMin);
  return evs;
}

function computeFreeWindows(events){
  const WORK_START = 8*60;
  const WORK_END   = 15*60;

  const free = [];
  let cur = WORK_START;

  for(const ev of events){
    if(cur < ev.startMin){
      free.push([cur, ev.startMin]);
    }
    cur = Math.max(cur, ev.endMin);
  }
  if(cur < WORK_END){
    free.push([cur, WORK_END]);
  }
  return free;
}

function pickBestSlot(freeWindows, durationMin, dateISO, employeeID){
  const candidates = [];
  for(const [s,e] of freeWindows){
    if((e - s) < durationMin) continue;

    // יצירת מספר אופציות בתוך אותו חלון כל 30 דקות
    for(let t = s; t + durationMin <= e; t += 30){
      candidates.push([t, t + durationMin]);
    }
  }
  if(candidates.length === 0) return null;

  const d = new Date(dateISO);
  const ymd = d.getFullYear()*10000 + (d.getMonth()+1)*100 + d.getDate();
  const seed = (Number(employeeID) || 0) + ymd;
  const index = Math.abs(seed) % candidates.length;

  return candidates[index];
}

function computeInstructorStats(data){
  const nextWeek = new Set(getNextWeekDatesISO());
  const stats = new Map();

  for(const c of (data.courses || [])){
    if(String(c.EventType || '').trim().toUpperCase() !== 'COURSE') continue;

    const empId = String(c.EmployeeID);
    if(!stats.has(empId)){
      stats.set(empId, { coursesCount: 0, daysSet: new Set() });
    }

    const row = stats.get(empId);
    row.coursesCount++;

    const ds = c.Dates || [];
    for(const d of ds){
      if(typeof d === 'string' && nextWeek.has(d)){
        row.daysSet.add(d);
      }
    }
  }

  return stats;
}

let _lastCoursesRows = [];

function computeInstructorCoursesCountRows(data){
  const instructors = (data.instructors || [])
    .filter(i => String(i.Role||'').toLowerCase() === 'instructor');

  const rows = instructors.map(inst => {
    const empId = String(inst.EmployeeID);
    let coursesCount = 0;

    for(const c of (data.courses || [])){
      if(String(c.EmployeeID) !== empId) continue;
      if(String(c.EventType || '').trim().toUpperCase() !== 'COURSE') continue;
      coursesCount++;
    }

    return {
      Employee: inst.Employee || '—',
      CoursesCount: coursesCount
    };
  });

  rows.sort((a,b) => (b.CoursesCount - a.CoursesCount) || String(a.Employee).localeCompare(String(b.Employee), 'he'));
  return rows;
}

function renderCoursesTable(rows){
  _lastCoursesRows = rows;

  const q = (document.getElementById('coursesSearch').value || '').trim().toLowerCase();
  const filtered = q ? rows.filter(r => String(r.Employee).toLowerCase().includes(q)) : rows;

  const tbody = document.getElementById('coursesBody');
  tbody.innerHTML = '';

  if(filtered.length === 0){
    tbody.innerHTML = `<tr><td colspan="2" class="muted">אין תוצאות</td></tr>`;
    return;
  }

  for(const r of filtered){
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="ellipsis"><strong>${r.Employee}</strong></td>
      <td class="num short">${r.CoursesCount}</td>
    `;
    tbody.appendChild(tr);
  }
}

function renderCoursesTableFromLast(){
  renderCoursesTable(_lastCoursesRows || []);
}

function isHolidayDate(data, dateISO){
  for(const c of (data.courses || [])){
    if(String(c.EventType || '').trim().toUpperCase() !== 'HOLIDAY') continue;
    if((c.Dates || []).includes(dateISO)) return true;
  }
  return false;
}

function hasRecurringConflictNextMonth(data, employeeID, dateISO, startMin, endMin){
  const targetDate = parseISODate(dateISO);
  if(!targetDate) return false;

  const targetDow = targetDate.getDay();
  const rangeAhead = addDays(targetDate, 45);

  for(const c of (data.courses || [])){
    if(String(c.EmployeeID) !== String(employeeID)) continue;

    const courseStart = timeToMin(c.StartTime);
    const courseEnd = timeToMin(c.EndTime);
    if(courseStart === null || courseEnd === null) continue;

    if(!(startMin < courseEnd && endMin > courseStart)) continue;

    for(const courseDateISO of (c.Dates || [])){
      const courseDate = parseISODate(courseDateISO);
      if(!courseDate) continue;
      if(courseDate <= targetDate) continue;
      if(courseDate > rangeAhead) continue;
      if(courseDate.getDay() !== targetDow) continue;
      return true;
    }
  }

  return false;
}

function scoreCandidate(data, inst, targetAuthority, dateISO, durationMin){
  const empId = String(inst.EmployeeID);
  const home = String(inst.HomeAuthority || '').trim();

  // distance home->target must exist
  const distHome = getDistanceKm(data, home, targetAuthority);
  if(distHome === null) return { ok:false, reason:'MissingDistance' };
  if(distHome > 30) return { ok:false, reason:'HomeDistance>30' };

  // events today
  const events = getInstructorEventsOnDate(data, empId, dateISO);

  // Hard: max 3 events/day
  if(events.length >= 3) return { ok:false, reason:'MaxDaily' };

  // free windows & slot
  const free = computeFreeWindows(events);
  const slot = pickBestSlot(free, durationMin, dateISO, empId);
  if(!slot) return { ok:false, reason:'NoWindow' };
  const [sMin, eMin] = slot;

  if(hasRecurringConflictNextMonth(data, empId, dateISO, sMin, eMin)){
    return { ok:false, reason:'RecurringConflictNextMonth' };
  }

  // authority movement rule (same day)
  const authoritiesToday = new Set(events.map(e => e.authority).filter(Boolean));
  const alreadyInTarget = authoritiesToday.has(String(targetAuthority).trim());

  let maxInter = 0;
  for(const a of authoritiesToday){
    if(!a || a === String(targetAuthority).trim()) continue;
    const d = getDistanceKm(data, a, targetAuthority);
    if(d === null) continue;
    maxInter = Math.max(maxInter, d);
  }
  if(maxInter > 45) return { ok:false, reason:'InterAuthority>45' }; // Hard fail

  // WorkDaysNextWeek (fairness) computed fresh on demand (no caching)
  const statsRows = computeInstructorStats(data);
  const instructorStats = statsRows.get(empId);
  const workDaysNextWeek = instructorStats ? instructorStats.daysSet.size : 0;
  const coursesCountTotal = instructorStats ? instructorStats.coursesCount : 0;

  // Score
  let score = 0;
  score += 50; // has window
  if(events.length === 0) score += 10; // empty day
  score -= (events.length * 5);

  // home distance band
  if(distHome <= 15) score += 0;
  else score -= 5; // 15–30

  // authority same-day preference
  if(alreadyInTarget) score += 10;
  else {
    if(maxInter > 30 && maxInter <= 45) score -= 15;
  }

  // slot quality bonus
  const WORK_START = 8*60, WORK_END = 15*60;
  if(sMin > WORK_START && eMin < WORK_END) score += 5;

  // Fairness: only next week workdays
  score -= (workDaysNextWeek * 3);

  // Soft load: total courses count (like in system)
  score -= (coursesCountTotal * 0.5);

  return {
    ok:true,
    score,
    distHome,
    slotStartMin: sMin,
    slotEndMin: eMin,
    workDaysNextWeek,
    coursesCountTotal,
    eventsCountToday: events.length
  };
}

function buildSuggestions(data, targetAuthority, durationMin, topN, daysLimit){
  const dates = getSuggestionDatesISO();

  const instructors = (data.instructors || [])
    .filter(i => String(i.Role||'').toLowerCase() === 'instructor');

  const results = [];
  const usedInPreviousDay = new Set();

  for(const dateISO of dates){
    // אל תציע שיבוץ ביום חג
    if(isHolidayDate(data, dateISO)) continue;

    const candidates = [];

    for(const inst of instructors){
      const out = scoreCandidate(data, inst, targetAuthority, dateISO, durationMin);
      if(!out.ok) continue;

      candidates.push({
        EmployeeID: String(inst.EmployeeID),
        Employee: inst.Employee || '—',
        HomeAuthority: inst.HomeAuthority || '—',
        score: out.score,
        slotStartMin: out.slotStartMin,
        slotEndMin: out.slotEndMin,
        distHome: out.distHome
      });
    }

    if(candidates.length === 0) continue;

    // sort by score desc
    candidates.sort((a,b)=>b.score - a.score);

    const picked = [];
    const usedToday = new Set();
    for(const c of candidates){
      // אל תבחר מדריך שהופיע בתאריך הקודם
      if(usedInPreviousDay.has(c.EmployeeID)) continue;

      if(usedToday.has(c.EmployeeID)) continue;

      picked.push(c);
      usedToday.add(c.EmployeeID);
      if(picked.length >= topN) break;
    }

    if(picked.length === 0){
      for(const c of candidates){
        if(usedToday.has(c.EmployeeID)) continue;
        picked.push(c);
        usedToday.add(c.EmployeeID);
        if(picked.length >= topN) break;
      }
    }
    if(picked.length === 0) continue;

    usedInPreviousDay.clear();
    for(const p of picked){
      usedInPreviousDay.add(p.EmployeeID);
    }

    results.push({
      date: dateISO,
      options: picked
        .sort((a,b)=> b.score - a.score)
        .map(p => ({
          name: p.Employee,
          start: minToTime(p.slotStartMin),
          end: minToTime(p.slotEndMin)
        }))
    });

    if(results.length >= daysLimit) break; // limit number of days shown
  }

  return results;
}

function renderSuggestions(list){
  const ul = document.getElementById('resultsList');
  ul.innerHTML = '';

  if(list.length === 0){
    ul.innerHTML = `<li class="muted">לא נמצאו שיבוצים מתאימים בטווח (מהיום +7 ועד היום +30, א׳–ה׳).</li>`;
    return;
  }

  for(const row of list){
    const li = document.createElement('li');
    li.className = 'item';

    const opts = row.options.map((o) =>
      `<span class="opt">${o.start}–${o.end} — ${o.name}</span>`
    ).join('');

    li.innerHTML = `
      <div class="item-header">
        <div>
          <div class="result-date">${row.date}</div>
          <div class="item-sub">אפשרויות: ${row.options.length}</div>
        </div>
      </div>
      <div class="options">${opts}</div>
    `;
    ul.appendChild(li);
  }
}

async function boot(){
  clearStatus('statusBoxCourses');
  clearStatus('statusBox2');

  try{
    const data = await loadSchedulingDataFresh();

    document.getElementById('metaInfo').textContent = '';

    const authorities = Object.keys(data.authorityLocations || {}).sort((a,b)=>a.localeCompare(b,'he'));
    const sel = document.getElementById('authoritySelect');
    sel.innerHTML = '';
    for(const a of authorities){
      const opt = document.createElement('option');
      opt.value = a;
      opt.textContent = a;
      sel.appendChild(opt);
    }

    const rows = computeInstructorCoursesCountRows(data);
    renderCoursesTable(rows);
    showStatus('statusBoxCourses', `נטענו ${rows.length} מדריכים.`, 'ok');

  }catch(err){
    console.error(err);
    showStatus('statusBoxCourses', 'שגיאה בטעינת scheduling.json (בדוק נתיב/הרשאות/העלאה).', 'error');
  }
}

async function runSuggestions(){
  clearStatus('statusBox2');
  document.getElementById('resultsList').innerHTML = `<li class="muted">מחשב הצעות…</li>`;

  const targetAuthority = document.getElementById('authoritySelect').value;
  const daysLimit = Number(document.getElementById('daysLimit').value);
  const topN = Number(document.getElementById('topN').value);
  const durationMin = Number(document.getElementById('durationMin').value);

  if(!targetAuthority){
    showStatus('statusBox2', 'יש לבחור רשות יעד.', 'error');
    return;
  }
  if(!Number.isFinite(durationMin) || durationMin < 30){
    showStatus('statusBox2', 'משך קורס לא תקין.', 'error');
    return;
  }

  try{
    const data = await loadSchedulingDataFresh();

    const suggestions = buildSuggestions(data, targetAuthority, durationMin, topN, daysLimit);
    renderSuggestions(suggestions);

    showStatus(
      'statusBox2',
      `נמצאו ${suggestions.length} תאריכים עם חלון מתאים. מוצגות עד ${daysLimit} שורות, עם ${topN} אפשרויות לכל תאריך.`,
      'ok'
    );

  }catch(err){
    console.error(err);
    showStatus('statusBox2', 'שגיאה בטעינת scheduling.json או בחישוב ההצעות.', 'error');
    document.getElementById('resultsList').innerHTML = `<li class="muted">שגיאה.</li>`;
  }
}

function goBackToDashboard(){
  location.href = 'index.html';
}

boot();
</script>
