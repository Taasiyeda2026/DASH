<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<!-- ביטול Cache מלא -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>דשבורד פעילויות</title>

<link rel="icon" href="icon-192.png" type="image/png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="manifest" href="manifest.json" />

<meta name="theme-color" content="#ffffff" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="דשבורד" />

<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  max-width: 100%;
  overflow-x: hidden;
  overscroll-behavior-x: none;
}

body {
  -webkit-text-size-adjust: 100%;
}

img {
  max-width: 100%;
  height: auto;
}

button, input, select {
  width: auto;
}

/* ===== LOGIN PAGE ===== */
.login-page{
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  background:#ffffff;
  overflow:hidden;
  direction:rtl;
}
.login-bg-shapes{position:absolute;inset:0;pointer-events:none;}
.login-shape{position:absolute;border-radius:50%;opacity:0.12;animation:floatShape 8s ease-in-out infinite;}
.login-shape-1{width:520px;height:520px;background:radial-gradient(circle,#3b82f6,transparent 70%);top:-120px;right:-120px;}
.login-shape-2{width:380px;height:380px;background:radial-gradient(circle,#818cf8,transparent 70%);bottom:-80px;left:-80px;animation-delay:3s;}
.login-shape-3{width:260px;height:260px;background:radial-gradient(circle,#38bdf8,transparent 70%);top:40%;left:30%;animation-delay:5s;opacity:0.07;}
@keyframes floatShape{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-24px) scale(1.04);}}
.login-card{
  position:relative;z-index:2;
  background:#ffffff;
  border:1px solid #e2e8f0;
  border-radius:28px;
  padding:52px 48px 44px;
  width:calc(100% - 40px);
  max-width:440px;
  box-shadow:0 8px 32px rgba(0,0,0,0.10),0 2px 8px rgba(0,0,0,0.06);
  animation:loginCardIn 0.5s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes loginCardIn{from{opacity:0;transform:translateY(28px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.login-logo-wrap{display:flex;justify-content:center;margin-bottom:28px;}
.login-logo{height:56px;max-width:200px;object-fit:contain;}
.login-title{font-size:26px;font-weight:800;color:#111827;text-align:center;margin-bottom:6px;letter-spacing:-0.3px;}
.login-subtitle{font-size:14px;color:#111827;text-align:center;margin-bottom:36px;font-weight:500;}
.login-form{display:flex;flex-direction:column;gap:18px;}
.login-field{display:flex;flex-direction:column;gap:8px;}
.login-label{font-size:13px;font-weight:700;color:#111827;padding-right:2px;}
.login-input{
  width:100%;height:56px;padding:0 20px;
  border:1.5px solid #cbd5e1;
  border-radius:14px;
  background:#f8fafc;
  color:#9ca3af;font-size:16px;font-family:inherit;
  outline:none;
  transition:border-color 0.2s,background 0.2s,box-shadow 0.2s;
  box-sizing:border-box;direction:rtl;
}
.login-input::placeholder{color:#9ca3af;}
.login-input:focus{border-color:#93c5fd;background:#ffffff;box-shadow:0 0 0 4px rgba(59,130,246,0.12);}
.login-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;height:56px;margin-top:6px;
  background:linear-gradient(135deg,#3b82f6,#1d4ed8);
  color:#ffffff;font-size:17px;font-weight:700;font-family:inherit;
  border:none;border-radius:14px;cursor:pointer;
  transition:transform 0.15s,box-shadow 0.15s,filter 0.15s;
  box-shadow:0 6px 24px rgba(29,78,216,0.55);
  letter-spacing:0.2px;
}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(29,78,216,0.65);filter:brightness(1.07);}
.login-btn:active{transform:translateY(0);box-shadow:0 3px 10px rgba(29,78,216,0.35);filter:brightness(0.96);}
.login-btn-icon{font-size:18px;line-height:1;transition:transform 0.2s;}
.login-btn:hover .login-btn-icon{transform:translateX(-5px);}
.login-error{min-height:22px;color:#111827;font-size:14px;font-weight:600;text-align:center;margin-top:2px;}
@media(max-width:500px){
  .login-card{padding:36px 24px 32px;border-radius:22px;}
  .login-title{font-size:22px;}
  .login-input,.login-btn{height:52px;font-size:15px;}
}

:root{
  --bg:#f8fafc;--card:#ffffff;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;--danger:#dc2626;
}
*{-webkit-tap-highlight-color:transparent;}
body{font-family:system-ui,Arial;background:var(--bg);color:var(--text)}

/* ===== MOBILE TOUCH OPTIMIZATIONS ===== */

/* ביטול עיכוב 300ms בלחיצה */
button,select,a,[onclick]{touch-action:manipulation;}

/* פידבק חזותי ללחיצה במובייל */
.event:active{opacity:0.78;transform:scale(0.97);transition:transform 0.1s,opacity 0.1s;}
.summary-col:active{transform:translateY(-2px);transition:transform 0.1s;}
.login-btn:active{transform:translateY(1px) !important;filter:brightness(0.93) !important;}
.today-star:active{transform:scale(0.88) !important;}
.today-calendar:active{transform:scale(0.88) !important;}
#prev:active,#next:active{transform:scale(0.9);}
#btnMonth:active,#btnWeek:active,#btnSummary:active,#btnInstructors:active,#btnEndDates:active{filter:brightness(0.93);}

/* מינימום שטח לחיצה 44px */
@media(max-width:800px){
  button{min-height:44px;}
  select{min-height:44px;}
  .side .close,.side-close{width:44px !important;height:44px !important;font-size:22px !important;}
  .nav-arrows #prev,.nav-arrows #next{width:44px;min-height:44px;}
  /* תחושת לחיצה לכרטיסי מדריכים */
  #view div[style*="cursor: pointer"]:active{
    transform:scale(0.96) !important;
    opacity:0.85;
    transition:transform 0.1s,opacity 0.1s;
  }
}
header{background:#fff;border-bottom:1px solid var(--border)}
.header-inner{width:100%;max-width:1200px;margin:0 auto;padding:14px;display:flex;gap:12px;align-items:center}
.app-logo{height:40px}

.controls{display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap;margin:10px}
.instructors-count-title{width:100%;max-width:1200px;margin:18px auto 0;padding:0 10px;text-align:right;font-size:16px;font-weight:700;}
select,button{height:32px;border:1px solid var(--border);border-radius:8px;background:#fff;padding:0 10px;cursor:pointer}
.today-star {
  width: 38px;
  height: 38px;
  background: linear-gradient(135deg, #fbbf24, #f59e0b);
  cursor: pointer;
  border: none;
  clip-path: polygon(
    50% 0%,
    61% 35%,
    98% 35%,
    68% 57%,
    79% 91%,
    50% 70%,
    21% 91%,
    32% 57%,
    2% 35%,
    39% 35%
  );
  transition: all 0.18s ease;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

.today-star:hover {
  transform: scale(1.1) rotate(8deg);
  box-shadow: 0 8px 20px rgba(245,158,11,0.4);
  filter: brightness(1.05);
}

.today-star:active {
  transform: scale(0.92);
  box-shadow: 0 2px 5px rgba(0,0,0,0.2);
  filter: brightness(0.9);
}
.today-calendar {
  width: 38px;
  height: 38px;
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  cursor: pointer;
  border: none;
  clip-path: inset(0 round 10px);
  transition: all 0.18s ease;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

.today-calendar::before {
  content: "📅";
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  width:100%;
  height:100%;
}

.today-calendar:hover {
  transform: scale(1.1);
  box-shadow: 0 8px 20px rgba(37,99,235,0.4);
}

.today-calendar:active {
  transform: scale(0.92);
}
#btnMonth.active{background:#e0f2fe;border-color:#7dd3fc}
#btnWeek.active{background:#ecfeff;border-color:#67e8f9}
#btnSummary.active{background:#f0fdf4;border-color:#86efac}
#btnInstructors.active{background:#fef3c7;border-color:#fcd34d}
#btnEndDates.active{background:#fce7f3;border-color:#f9a8d4}

.nav{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--border);z-index:10;display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap;margin:0;padding:10px}
.nav-modes{display:flex;gap:8px;align-items:center}
.nav-arrows{display:flex;gap:8px;align-items:center}
.nav-arrows #title{width:100%;max-width:240px;text-align:center;font-weight:700;font-size:15px;white-space:nowrap;}

#view{
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px 20px 150px 20px;
}

.grid{width:100%;max-width:1200px;margin:0 auto;padding:10px;display:grid;grid-template-columns:repeat(7,1fr);gap:12px;grid-auto-rows: 1fr;}
.day{background:var(--card);border-radius:12px;padding:8px;min-height:140px;border:1px solid var(--border); display: flex; flex-direction: column; gap: 4px;}
.day.today{
  border:2px solid #3b82f6 !important;
  box-shadow:0 0 0 3px rgba(59,130,246,0.15);
}
.day.empty{min-height:auto;opacity:0.5;}
.day.inactive{min-height:auto;opacity:0.3;}
.day-header{font-size:13px;font-weight:700;border-bottom:1px solid var(--border);margin-bottom:4px;padding-bottom:4px;text-align:center;letter-spacing:0.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.event{padding:6px;border-radius:8px;font-size:12px;cursor:pointer;border-right:5px solid rgba(0,0,0,0.1);background:rgba(255,255,255,.9); position: relative; min-height: 55px; display: flex; flex-direction: column; justify-content: center; overflow: hidden;}
.event.missing{border:2px solid var(--danger);border-right:5px solid var(--danger);background:#fff !important}
.badge-count{background:rgba(0,0,0,0.7); color:#fff; font-size:9px; padding:1px 4px; border-radius:10px; position: absolute; top: 4px; left: 4px; font-weight:bold;}
.event-hour{font-size:10px; color:#0f172a; font-weight:600; background:rgba(255,255,255,0.65); backdrop-filter:blur(2px); padding:2px 6px; border-radius:6px; align-self:flex-start; margin-bottom:4px;}

/* side panel */
.side,.side-panel{position:fixed;top:0;left:0;width:320px;max-width:100%;height:100%;background:#fff;box-shadow:-6px 0 24px rgba(0,0,0,.18);transform:translateX(-100%);transition:.28s ease;z-index:50;padding:0;overflow:hidden;display:flex;flex-direction:column;}
.side.open{transform:translateX(0)}
.side .close,
.side-close{position:relative;top:auto;left:auto;flex-shrink:0;align-self:flex-start;margin:14px 0 4px 14px;z-index:1000;background:#fff;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;box-shadow:0 1px 6px rgba(0,0,0,0.12);}
#sideContent{flex:1;overflow-y:auto;padding:0 18px 18px 18px;}
.side h2{margin:0 0 6px 0;font-size:20px}
.side .subtitle{font-size:13px;color:var(--muted);margin-bottom:14px}
.side .row{display:flex;justify-content:space-between;gap:10px;margin:8px 0;font-size:14px}
.side .label{color:var(--muted);font-size:12px}
.side .value{font-weight:600}
.side .badge{display:inline-block;background:#e0f2fe;color:#0369a1;padding:2px 8px;border-radius:999px;font-size:12px;font-weight:600}
.group-item{background:#f8fafc; border:1px solid var(--border); border-radius:12px; padding:12px; margin-bottom:12px;}

.instructor-header{
  background:linear-gradient(135deg,#f8fafc,#e2e8f0);
  padding:18px;
  border-radius:16px;
  margin-bottom:16px;
}

.instructor-name{
  font-size:20px;
  font-weight:800;
  margin-bottom:10px;
  color:#0f172a;
}

.instructor-badges{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.instructor-badges .badge{
  padding:6px 12px;
  border-radius:999px;
  font-size:13px;
  font-weight:600;
}

.badge.type{
  background:#e0f2fe;
  color:#0369a1;
}

.badge.days{
  background:#dcfce7;
  color:#166534;
}

.badge.courses{
  background:#fef3c7;
  color:#92400e;
}

.course-card{
  background:#ffffff;
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
  margin-bottom:14px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
  transition:0.2s;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.course-card span{
  line-height:1.7;
}

.course-card:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 18px rgba(0,0,0,0.08);
}

.course-title{
  font-weight:700;
  font-size:15px;
  margin-bottom:8px;
}

.course-meta{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  font-size:13px;
  color:#475569;
}

/* --- עמוד תאריכי סיום --- */
.end-dates-wrap{width:100%;max-width:560px;margin:24px auto;padding:0 12px;box-sizing:border-box}
.end-dates-title{text-align:center;font-size:18px;font-weight:700;color:#1e293b;margin-bottom:16px}
.end-dates-table{width:100%;border-collapse:collapse;font-size:14px;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,0.08)}
.end-dates-table th{padding:10px 14px;text-align:right;font-weight:700;background:#f8fafc;border-bottom:2px solid #e2e8f0;color:#334155;white-space:nowrap}
.end-dates-table td{padding:9px 14px;text-align:right;border-bottom:1px solid #f1f5f9;color:#1e293b}
.end-dates-table tr:last-child td{border-bottom:none}
.end-dates-table tbody tr:hover{background:#f8fafc}
.end-dates-past td{color:#94a3b8}
@media(max-width:800px){
  .end-dates-wrap{padding:0 8px;margin:14px auto}
  .end-dates-table th,.end-dates-table td{padding:8px 10px;font-size:13px}
}

/* --- שינויים בעמוד הסיכום --- */
.summary-wrap{width:100%;max-width:1200px;margin:0 auto;padding:10px;display:grid;gap:16px}
.summary-top{background:#fff;border:1px solid var(--border);border-radius:16px;padding:20px;text-align:center}

.summary-split{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,300px));
  gap:24px;
  justify-content:center;
  align-items:start;
}

.summary-col{
  background:#ffffff;
  border:1px solid #e5e7eb;
  border-radius:20px;
  padding:24px;
  box-shadow:0 10px 25px rgba(0,0,0,0.06);
  transition:0.2s ease;
  cursor:pointer;
  text-align:center;
}

.summary-col:hover{
  transform:translateY(-4px);
  box-shadow:0 16px 35px rgba(0,0,0,0.12);
}

/* טיפול בטקסט ארוך בתוך התיבות בסיכום */
.summary-col .event {
  width: 100%;
  white-space: normal;      /* מאפשר לטקסט לרדת שורה */
  word-wrap: break-word;    /* שובר מילים ארוכות אם צריך */
  height: auto;
  min-height: unset;
  padding: 10px;
  margin-top: 8px;
}

/* ===== SUMMARY KPI ===== */

.summary-wrap{
  width:100%;
  max-width:1200px;
  margin:0 auto;
  padding:30px 20px;
  display:grid;
  gap:30px;
}

.summary-top{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.kpi-card{
  background:#ffffff;
  border:1px solid #e5e7eb;
  border-radius:18px;
  padding:26px;
  box-shadow:0 8px 20px rgba(0,0,0,0.06);
  text-align:center;
}

.kpi-label{
  font-size:13px;
  color:#64748b;
  margin-bottom:8px;
  font-weight:600;
}

.kpi-value{
  font-size:40px;
  font-weight:800;
  color:#0f172a;
}

/* ===== MANAGER CARDS ===== */

.summary-col h3{
  margin:0 0 12px 0;
  font-size:18px;
  font-weight:800;
  border-bottom:2px solid #f59e0b;
  padding-bottom:6px;
}

.summary-course-box{
  margin-top:12px;
  padding:14px 16px;
  border-radius:14px;
  background:linear-gradient(135deg,#f8fafc,#eef2f7);
  font-size:14px;
  font-weight:600;
  color:#0f172a;
  box-shadow:inset 0 0 0 1px #e2e8f0;
}

.manager-overlay-bg{
  position:fixed;
  inset:0;
  background:rgba(15,23,42,0.55);
  backdrop-filter:blur(4px);
  z-index:99;
  animation:fadeIn .2s ease;
}

@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

.manager-details-overlay{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:100;
  width:100%;
  max-width:600px;
  background:linear-gradient(135deg,#ffffff,#f8fafc);
  border-radius:22px;
  box-shadow:0 25px 70px rgba(0,0,0,0.35);
  padding:28px 30px;
  animation:popIn .2s ease;
  max-height:80vh;
  overflow:auto;
}

@keyframes popIn{
  from{
    opacity:0;
    transform:translate(-50%,-48%) scale(.96);
  }
  to{
    opacity:1;
    transform:translate(-50%,-50%) scale(1);
  }
}

.manager-course-card{
  background:#ffffff;
  border-radius:16px;
  padding:18px 20px;
  margin-bottom:18px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
  transition:.2s;
}

.manager-course-card:last-child{
  margin-bottom:0;
}

.manager-course-title{
  font-weight:800;
  font-size:16px;
  margin-bottom:8px;
  color:#0f172a;
}

.manager-course-meta{
  font-size:14px;
  color:#475569;
  line-height:1.8;
}

/* --- instructors main cards sizing (home instructors view only) --- */
#view > div[style*="grid-template-columns: repeat(auto-fill,minmax(180px,1fr))"]{
  grid-template-columns:repeat(auto-fill,minmax(90px,1fr)) !important;
  gap:8px !important;
}

#view > div[style*="grid-template-columns: repeat(auto-fill,minmax(180px,1fr))"] > div{
  min-height:70px !important;
  padding:8px !important;
  border-radius:12px !important;
}

#view > div[style*="grid-template-columns: repeat(auto-fill,minmax(180px,1fr))"] > div div:first-child{
  font-size:9px !important;
  margin-bottom:4px !important;
}

#view > div[style*="grid-template-columns: repeat(auto-fill,minmax(180px,1fr))"] > div div:nth-child(2){
  font-size:16px !important;
}

#view > div[style*="grid-template-columns: repeat(auto-fill,minmax(180px,1fr))"] > div div:nth-child(3){
  font-size:7px !important;
  margin-top:3px !important;
}

/* --- התאמה מלאה לנייד --- */
@media(max-width:800px){
  /* הקטנת ריווח כללי במובייל */
  header{
    padding: 10px 12px !important;
    position: sticky;
    top: 0;
    z-index: 20;
  }

  .nav{
    padding: 8px 10px !important;
    top: 89px;
  }

  #view{
    padding: 10px !important;
  }

  /* גריד עמודה אחת */
  .grid{grid-template-columns:1fr !important; gap:10px !important; padding:6px;}

  /* ביטול גובה אחיד של ימים במובייל */
  .grid{
    grid-auto-rows: auto !important;
  }

  .day{
    min-height: auto !important;
    height: auto !important;
    padding: 10px !important;
  }

  /* סיכום - התאמה למסך קטן */
  .summary-split{
    grid-template-columns:1fr;
    justify-items:center;
    gap:18px;
  }

  .summary-col{
    width:92%;
    max-width:380px;
    min-width:unset;
  }

  .summary-wrap{
    padding: 0 !important;
  }

  /* פילטרים - עמודה אנכית במובייל */
  .controls {
    flex-direction: column;
    align-items: stretch;
    gap: 6px;
    padding: 0 10px;
  }
  .controls select,
  .controls button {
    width: 100%;
    height: 40px;           /* גודל נגיש למגע */
    font-size: 14px;
  }

  .nav button,
  .nav select {
    width: 100%;
  }

  .instructors-count-title{
    margin-top:12px;
    font-size:15px;
    padding:0 12px;
  }

  /* ניווט - שתי שורות מסודרות */
  .nav {
    flex-direction: column !important;
    gap: 8px !important;
  }

  /* הסתרת כפתורי חודש ושבוע במובייל */
  #btnMonth,
  #btnWeek{
    display: none !important;
  }

  /* מרכוז שורת מצבי תצוגה */
  .nav-modes {
    width: 100%;
    display: flex !important;
    justify-content: center !important;
    align-items: center !important;
    gap: 10px !important;
    margin-bottom: 8px !important;
  }

  /* כפתורי מצב תצוגה – שורה אחת קומפקטית */
  .nav-modes button {
    flex: 1 1 0;
    font-size: 11px;
    height: 32px;
    padding: 0 4px;
    white-space: nowrap;
  }

  #btnSummary,
  #btnInstructors,
  #btnEndDates {
    flex: 1 1 0 !important;
    width: auto !important;
    height: 32px !important;
    font-size: 11px !important;
    border-radius: 10px !important;
    padding: 0 4px !important;
  }
  .nav-modes select {
    height: 38px;
    font-size: 14px;
  }

  /* שורת ניווט (חיצים + כותרת) - שורה שנייה, מלא רוחב */
  .nav-arrows {
    width: 100%;
    justify-content: center;
  }
  .nav-arrows #prev,
  .nav-arrows #next {
    width: 40px;
    height: 36px;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .nav-arrows #title {
    font-size: 13px;
    min-width: 0;
    flex: 1 1 auto;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* כרטיסי ימים */
  .day {
    min-height: auto !important;
    padding: 10px !important;
  }
  .day.empty, .day.inactive {
    display: none !important;
  }

  /* אירועים - גודל נגיש למגע */
  .event {
    font-size: 14px !important;
    padding: 10px !important;
    min-height: 52px !important;
  }

  /* פאנל צד – bottom sheet במובייל */
  .side, .side-panel {
    top: auto !important;
    bottom: 0 !important;
    left: 0 !important;
    right: 0 !important;
    width: 100% !important;
    max-width: 100% !important;
    height: 88vh !important;
    transform: translateY(110%) !important;
    border-radius: 20px 20px 0 0 !important;
    box-shadow: 0 -6px 32px rgba(0,0,0,.22) !important;
    transition: transform .32s cubic-bezier(.32,.72,0,1) !important;
  }
  .side.open, .side-panel.open {
    transform: translateY(0) !important;
  }
  /* drag handle */
  .side::before {
    content: '';
    display: block;
    width: 40px;
    height: 4px;
    background: #cbd5e1;
    border-radius: 2px;
    margin: 10px auto 4px;
    flex-shrink: 0;
  }
  .side .close, .side-close {
    align-self: center !important;
    margin: 4px auto 8px !important;
  }

  .instructors-grid,
  #view > div[style*="grid-template-columns: repeat(auto-fill,minmax(180px,1fr))"]{
    grid-template-columns: repeat(3,minmax(0,1fr)) !important;
    gap: 6px !important;
  }

  .instructors-grid > div,
  #view > div[style*="grid-template-columns: repeat(auto-fill,minmax(180px,1fr))"] > div{
    min-height: 68px;
    padding: 7px !important;
    border-radius: 12px;
  }

  .instructors-grid > div div:first-child,
  #view > div[style*="grid-template-columns: repeat(auto-fill,minmax(180px,1fr))"] > div div:first-child{
    font-size: 9px !important;
  }

  .instructors-grid > div div:nth-child(2),
  #view > div[style*="grid-template-columns: repeat(auto-fill,minmax(180px,1fr))"] > div div:nth-child(2){
    font-size: 14px !important;
  }

  .instructors-grid > div div:nth-child(3),
  #view > div[style*="grid-template-columns: repeat(auto-fill,minmax(180px,1fr))"] > div div:nth-child(3){
    font-size: 7px !important;
    margin-top: 2px !important;
  }

  /* כותרת */
  .header-inner {
    padding: 10px;
    gap: 8px;
  }
  .app-logo {
    height: 32px;
  }
